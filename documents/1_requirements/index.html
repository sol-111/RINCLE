<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincle 要件定義</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;background:#212124;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}

/* ── NAV BAR ── */
#navbar{
  height:42px;
  background:#1e1e24;
  border-bottom:1px solid #2e2e38;
  display:flex;
  align-items:stretch;
  flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  padding:0 10px;
  gap:2px;
}
.logo{
  display:flex;align-items:center;
  font-size:14px;font-weight:700;color:#d0d0d8;
  white-space:nowrap;padding:0 12px 0 4px;
  border-right:1px solid #2e2e38;margin-right:6px;
  letter-spacing:.3px;
}
.logo span{color:#5588cc;margin-right:6px}

/* ── TAB BUTTONS ── */
.tab-btn{
  display:flex;align-items:center;gap:6px;
  padding:0 16px;
  border:none;background:transparent;
  color:#686880;font-size:12px;font-weight:600;
  cursor:pointer;
  border-bottom:2px solid transparent;
  border-top:2px solid transparent;
  transition:color .15s,background .15s,border-color .15s;
  white-space:nowrap;
  position:relative;
}
.tab-btn .ico{font-size:13px}
.tab-btn:hover{color:#b0b0cc;background:rgba(255,255,255,.04)}
.tab-btn.active{
  color:#90b8f0;
  border-bottom-color:#4a8ad8;
  background:rgba(74,138,216,.07);
}
.tab-btn .badge{
  font-size:9px;padding:1px 5px;border-radius:8px;
  background:#2a3a50;color:#6090d0;
  font-weight:700;line-height:1.4;
}

/* ── LOADING OVERLAY ── */
#loader{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  background:#1a1a1f;color:#5a5a6a;
  font-size:13px;pointer-events:none;z-index:10;
  opacity:0;transition:opacity .2s;
}
#loader.show{opacity:1}
.spinner{
  width:28px;height:28px;
  border:2px solid #2e2e3a;
  border-top-color:#4a8ad8;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FRAME CONTAINER ── */
#frame-container{
  position:relative;
  width:100%;
  height:calc(100vh - 42px);
  overflow:hidden;
}

/* ── IFRAMES ── */
.pane{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;
  display:none;
}
.pane.active{display:block}
</style>
</head>
<body>

<div id="navbar">
  <div class="logo"><span>📂</span>Rincle 要件定義</div>

  <button class="tab-btn active" data-tab="screens" onclick="switchTab('screens')">
    <span class="ico">📊</span> 画面設計書
  </button>
  <button class="tab-btn" data-tab="flow" onclick="switchTab('flow')">
    <span class="ico">📐</span> 画面遷移図
  </button>
  <button class="tab-btn" data-tab="biz_flow" onclick="switchTab('biz_flow')">
    <span class="ico">📋</span> 業務フロー
  </button>
  <button class="tab-btn" data-tab="emails" onclick="switchTab('emails')">
    <span class="ico">✉️</span> メール一覧
  </button>
  <button class="tab-btn" data-tab="db" onclick="switchTab('db')">
    <span class="ico">🗄️</span> DB設計書
  </button>
  <button class="tab-btn" data-tab="er" onclick="switchTab('er')">
    <span class="ico">🔗</span> ER図
  </button>
</div>

<div id="frame-container">
  <div id="loader"><div class="spinner"></div><span>読み込み中...</span></div>

  <iframe id="f-screens" class="pane active" src="screens.html" allow="file-system-access"></iframe>
  <iframe id="f-flow"    class="pane" allow="file-system-access"></iframe>
  <iframe id="f-db"      class="pane" allow="file-system-access"></iframe>
  <iframe id="f-biz_flow" class="pane" allow="file-system-access"></iframe>
  <iframe id="f-emails"  class="pane" allow="file-system-access"></iframe>
  <iframe id="f-er"      class="pane" allow="file-system-access"></iframe>
</div>

<script>
const SRCS = {
  screens:  'screens.html',
  flow:     'flow.html',
  db:       'db.html',
  biz_flow: 'biz_flow.html',
  emails:   'emails.html',
  er:       'er.html',
};

const loaded  = new Set();
const loader  = document.getElementById('loader');
let   current = 'screens';

// ── After iframe loads: hide inner topbar & fix layout ──────────────────────
function patchFrame(iframe, tab) {
  try {
    const doc = iframe.contentDocument;
    if (!doc || !doc.body) return;

    // Hide the page's own top bar (we have our nav)
    const tb = doc.getElementById('topbar');
    if (tb) tb.style.display = 'none';

    // Scrollable table: reclaim the topbar height (≈42px)
    const ssWrap = doc.getElementById('ss-wrap');
    if (ssWrap) {
      const cur = getComputedStyle(ssWrap).maxHeight;
      const match = cur.match(/calc\(100vh\s*-\s*(\d+)px\)/);
      if (match) {
        const newPx = Math.max(120, parseInt(match[1]) - 46);
        ssWrap.style.maxHeight = `calc(100vh - ${newPx}px)`;
      } else {
        ssWrap.style.maxHeight = 'calc(100vh - 200px)';
      }
    }

    // Diagram pages: call fitView after visible
    if (tab === 'flow') {
      const win = iframe.contentWindow;
      if (win.fitView) setTimeout(() => win.fitView(), 80);
    }
    if (tab === 'biz_flow') {
      const win = iframe.contentWindow;
      setTimeout(() => {
        if (win.D1) win.D1.fitView();
        if (win.D2) win.D2.fitView();
      }, 80);
    }
  } catch(e) { /* cross-origin guard — shouldn't happen for local files */ }
}

// ── Load a frame for the first time ────────────────────────────────────────
function loadFrame(tab) {
  if (loaded.has(tab)) return;
  loaded.add(tab);
  const iframe = document.getElementById('f-' + tab);
  loader.classList.add('show');
  iframe.src = SRCS[tab];
  iframe.addEventListener('load', () => {
    patchFrame(iframe, tab);
    if (tab === current) loader.classList.remove('show');
  }, { once: true });
}

// ── Tab switching ───────────────────────────────────────────────────────────
function switchTab(tab) {
  if (tab === current) return;
  current = tab;

  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );

  // Show / hide panes
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  const iframe = document.getElementById('f-' + tab);
  iframe.classList.add('active');

  // Lazy load
  if (!loaded.has(tab)) {
    loadFrame(tab);
  } else {
    loader.classList.remove('show');
    // Re-fit diagrams when switching back
    if (tab === 'flow' || tab === 'biz_flow') {
      setTimeout(() => {
        try {
          const win = iframe.contentWindow;
          if (win.fitView) win.fitView();
          if (win.D1) win.D1.fitView();
          if (win.D2) win.D2.fitView();
        } catch(e) {}
      }, 50);
    }
  }
}

// ── Initial load (screens is already src-set, others lazy) ─────────────────
document.getElementById('f-screens').addEventListener('load', () => {
  loaded.add('screens');
  patchFrame(document.getElementById('f-screens'), 'screens');
  loader.classList.remove('show');
});

// Keyboard shortcut: Ctrl/Cmd + 1~5
document.addEventListener('keydown', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  const tabs = ['screens','flow','biz_flow','emails','db','er'];
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx < tabs.length) { e.preventDefault(); switchTab(tabs[idx]); }
});
</script>
</body>
</html>
