<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincle DB設計書</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:13px;background:#212124;color:#c0c0cc}

#topbar{position:sticky;top:0;z-index:200;background:#2a2a2f;padding:7px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.5);border-bottom:1px solid #38383f}
#topbar h1{font-size:15px;font-weight:700;white-space:nowrap;color:#d0d0d8}
#search-box{flex:1;max-width:380px;padding:5px 11px;border:1px solid #444450;border-radius:4px;font-size:13px;outline:none;background:#38383f;color:#d0d0d8}
#search-box::placeholder{color:#7a7a8a}
.btn{padding:5px 13px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:filter .15s;background:#38383f;color:#a0a0b8}
.btn:hover{filter:brightness(1.2)}
.btn-green{background:#34a853;color:#fff}
#saved-badge{font-size:11px;opacity:.7;white-space:nowrap}

#content{padding:14px;max-width:100%}
.card{background:#2a2a2f;border-radius:8px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.4);overflow:hidden;border:1px solid #38383f}
.card-hd{background:#2e2e34;border-bottom:1px solid #38383f;padding:9px 14px;font-size:13px;font-weight:700;color:#a8b8d0;display:flex;justify-content:space-between;align-items:center;cursor:default}

#tb{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#2e2e34;border-bottom:1px solid #38383f;flex-wrap:wrap}
#tb label{font-size:12px;color:#888898}
.tb-sep{width:1px;height:20px;background:#444450;margin:0 2px}
#col-filter,#group-filter{padding:4px 10px;border:1px solid #444450;border-radius:4px;font-size:12px;outline:none;background:#38383f;color:#c0c0d0}

#ss-wrap{overflow:auto;max-height:calc(100vh - 240px)}
#ss{border-collapse:collapse;width:100%;table-layout:fixed}
#ss thead{position:sticky;top:0;z-index:10}
#ss thead tr.hd-main th{background:#2a2a2f;color:#9090a8;padding:7px 8px;text-align:left;font-size:12px;font-weight:700;border-right:1px solid rgba(255,255,255,.06);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;position:relative}
#ss thead tr.hd-filter th{background:#2e2e34;padding:3px 5px;border-right:1px solid #38383f}
#ss thead tr.hd-filter input{width:100%;border:1px solid #44444f;border-radius:3px;padding:3px 6px;font-size:11px;outline:none;background:#38383f;color:#b8b8c8}
#ss thead tr.hd-filter input::placeholder{color:#66667a}
#ss thead tr.hd-filter input:focus{border-color:#6688aa}

#ss tbody tr{border-bottom:1px solid rgba(255,255,255,.05)}
#ss tbody tr:hover td{filter:brightness(1.1)!important}
#ss tbody td{padding:4px 7px;vertical-align:middle;border-right:1px solid rgba(255,255,255,.04);outline:none;white-space:pre-wrap;word-break:break-word;line-height:1.4;min-height:26px;color:#c0c0cc}
#ss tbody td[contenteditable=true]:focus{background:#2a3a4a!important;outline:2px solid #5588aa;outline-offset:-2px;color:#e0e0ec!important}

/* drag */
.td-drag{background:rgba(0,0,0,.15)!important;width:22px;text-align:center;border-right:1px solid rgba(255,255,255,.05)!important;padding:0!important;vertical-align:middle!important;cursor:grab;color:#555568;font-size:14px;user-select:none}
.td-drag:active{cursor:grabbing}
#ss tbody tr.dragging{opacity:.4}
#ss tbody tr.drag-over td{border-top:2px solid #5588aa!important}
#ss thead tr.hd-main .th-drag{background:#252528!important;width:22px}
#ss thead tr.hd-filter .th-drag{background:#2e2e34!important;width:22px}
#ss thead tr.hd-main .th-act{background:#252528!important;width:68px}
#ss thead tr.hd-filter .th-act{background:#2e2e34!important}

/* actions */
.td-act{background:rgba(0,0,0,.15)!important;width:68px;text-align:center;border-left:1px solid rgba(255,255,255,.05)!important;padding:2px 4px!important;vertical-align:middle!important;white-space:nowrap}
.td-act .btn-add-row{margin-right:8px}
.btn-add-row{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid #34a853;border-radius:50%;background:transparent;color:#34a853;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(52,168,83,.2)}
.btn-add-row:hover{background:#34a853;color:#fff;box-shadow:0 2px 6px rgba(52,168,83,.5)}
.btn-del-row{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid #ea4335;border-radius:50%;background:transparent;color:#ea4335;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(234,67,53,.2)}
.btn-del-row:hover{background:#ea4335;color:#fff;box-shadow:0 2px 6px rgba(234,67,53,.5)}

/* boolean cell */
.td-bool{text-align:center!important;cursor:pointer;padding:0!important}
.td-bool input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#7ab3ff;pointer-events:none}

/* select cell */
.td-sel{padding:2px 4px!important}
.dtype-sel{width:100%;border:none;border-radius:3px;padding:2px 4px;font-size:13px;cursor:pointer;outline:none;font-family:inherit;font-weight:600;background:transparent}
.dtype-sel option{background:#2a2a2f;color:#c0c0cc}
.dtype-text   {color:#7ab3ff}
.dtype-number {color:#81c784}
.dtype-date   {color:#ffb74d}
.dtype-boolean{color:#ce93d8}
.dtype-image  {color:#f48fb1}
.dtype-option {color:#ffcc80}
.dtype-ref    {color:#80cbc4}

/* table name cell */
td.col-tbl{font-family:monospace;font-size:13px;color:#8898b0!important;font-weight:600}
td.col-field{font-family:monospace;font-size:13px;color:#a0b0c0!important}

/* status */
#statusbar{background:#2e2e34;border-top:1px solid #38383f;padding:4px 12px;font-size:11px;color:#666678;display:flex;justify-content:space-between}
#toast{position:fixed;bottom:22px;right:22px;background:#2e2e34;color:#c0c0d0;border:1px solid #44444f;padding:9px 16px;border-radius:6px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
mark{background:#3a3a00;color:#ffe066;border-radius:2px;padding:0}

/* ── COLUMN RESIZE ── */
#ss thead tr.hd-main th{position:relative}
.col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;user-select:none;z-index:1}
.col-resizer:hover,.col-resizer.resizing{background:#5588aa;opacity:.7}

/* ── PAGE TABS ── */
#page-tabs{display:flex;align-items:stretch;background:#252528;border-bottom:1px solid #38383f;padding:0 14px;gap:2px;flex-shrink:0}
.ptab{display:flex;align-items:center;gap:5px;padding:0 14px;border:none;background:transparent;color:#686880;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;height:34px;transition:color .15s,border-color .15s;white-space:nowrap}
.ptab:hover{color:#b0b0cc;background:rgba(255,255,255,.04)}
.ptab.active{color:#90b8f0;border-bottom-color:#4a8ad8}

/* ── OPTION SET SECTION ── */
#os-section{padding:0 14px 14px;max-width:100%;display:none;overflow:auto;max-height:calc(100vh - 80px)}
#os-section.active{display:block}
#db-section.hidden{display:none}
#os-header{display:flex;align-items:center;gap:10px;padding:10px 0 8px;position:sticky;top:0;background:#212124;z-index:5}
#os-search{flex:1;max-width:360px;padding:5px 11px;border:1px solid #444450;border-radius:4px;font-size:13px;outline:none;background:#38383f;color:#d0d0d8}
#os-search::placeholder{color:#7a7a8a}
#os-status{font-size:11px;color:#666678;white-space:nowrap}
.os-card{margin-bottom:10px}
.os-card-tbl{border-collapse:collapse;width:100%;font-size:12px;table-layout:auto}
.os-card-tbl thead th{background:#2a2a35;color:#9090a8;padding:5px 10px;text-align:left;border-right:1px solid rgba(255,255,255,.06);font-size:11px;font-weight:700;white-space:nowrap;user-select:none}
.os-card-tbl thead .otha-display{color:#90b8e8}
.os-card-tbl thead .otha-attr{color:#c0a0e0}
.os-card-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
.os-card-tbl tbody tr:hover td{filter:brightness(1.15)}
.os-card-tbl tbody td{padding:5px 10px;border-right:1px solid rgba(255,255,255,.04);vertical-align:middle;color:#c0c0cc;word-break:break-word;line-height:1.4}
.os-card-tbl .td-display{font-weight:600;color:#a8c8e0;white-space:nowrap}
.os-card-tbl .td-attr{font-family:monospace;font-size:12px;color:#d0b8f0}
.os-abbrev{padding:8px 14px;color:#7a7a8a;font-size:12px;font-style:italic}
</style>
</head>
<body>

<div id="topbar">
  <h1>🗄️ Rincle DB設計書</h1>
  <input id="search-box" type="text" placeholder="🔍 全体検索...">
  <button class="btn btn-green" onclick="exportMd()">📄 MD出力</button>
  <button class="btn" onclick="linkFile()">📂 ファイルをリンク</button>
  <span id="file-badge" style="font-size:11px;opacity:.7;white-space:nowrap"></span>
</div>

<div id="page-tabs">
  <button class="ptab active" data-ptab="db" onclick="switchPageTab('db')">🗄️ データベース</button>
  <button class="ptab" data-ptab="os" onclick="switchPageTab('os')">🔖 オプションセット</button>
</div>

<div id="db-section">
<div class="card">
  <div class="card-hd">
    DB フィールド一覧
    <span id="row-count" style="font-size:11px;color:#666;font-weight:400"></span>
  </div>
  <div id="tb">
    <label>テーブル:</label>
    <select id="group-filter" onchange="applyFilters()"><option value="">すべて</option></select>
    <div class="tb-sep"></div>
    <label>型:</label>
    <select id="dtype-filter" onchange="applyFilters()">
      <option value="">すべて</option>
      <option value="text">text</option>
      <option value="number">number</option>
      <option value="date">date</option>
      <option value="boolean">boolean</option>
      <option value="image">image</option>
      <option value="option">option</option>
      <option value="ref">ref</option>
    </select>
  </div>
  <div id="ss-wrap">
    <table id="ss">
      <thead>
        <tr class="hd-main">
          <th class="th-drag"></th>
          <th style="width:130px">テーブル名</th>
          <th style="width:170px">フィールド名</th>
          <th style="width:140px">表示名</th>
          <th style="width:48px;text-align:center">必須</th>
          <th style="width:64px;text-align:center">index</th>
          <th style="width:100px">データ型</th>
          <th style="width:44px;text-align:center">List</th>
          <th style="width:200px">バリデーション</th>
          <th style="width:160px">備考</th>
          <th class="th-act"></th>
        </tr>
        <tr class="hd-filter">
          <th class="th-drag"></th>
          <th><input placeholder="テーブル" oninput="applyFilters()" data-col="0"></th>
          <th><input placeholder="フィールド" oninput="applyFilters()" data-col="1"></th>
          <th><input placeholder="表示名" oninput="applyFilters()" data-col="2"></th>
          <th></th><th></th><th></th><th></th>
          <th><input placeholder="バリデーション" oninput="applyFilters()" data-col="7"></th>
          <th><input placeholder="備考" oninput="applyFilters()" data-col="8"></th>
          <th class="th-act"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="statusbar">
    <span id="status-left">0 行表示</span>
    <span id="status-right">Tab・矢印キーで移動 / Enter で確定</span>
  </div>
</div>
</div>

<div id="os-section">
  <div id="os-header">
    <input id="os-search" type="text" placeholder="🔍 オプションセット検索..." oninput="applyOsFilters()">
    <span id="os-status"></span>
  </div>
  <div id="os-container"></div>
</div>

<div id="toast"></div>

let dragSrcRi = -1;

// ─── GROUP COLORS ─────────────────────────────────────────────────────────────
const TABLE_COLORS = {
  'user':'#1a2f48','bicycle':'#1a3228','price_menu':'#2a2515','option':'#251a30',

  '______defaults':'#2a2210','_________ (holiday_master)':'#2a2210',
  '______1 (reservation_count)':'#242228',

function rowColor(tbl){ return TABLE_COLORS[tbl] || '#1e1e24'; }

// ─── INIT ─────────────────────────────────────────────────────────────────────
const COLS = ['table','field','display','required','ix','dtype','list','validation','notes'];
function toObj(arr){
  return {id:String(arr[0]),table:arr[1],field:arr[2],display:arr[3],
          required:!!arr[4],ix:!!arr[5],dtype:arr[6],list:!!arr[7],
          validation:arr[8],notes:arr[9]};
}

function init(){
  const saved = localStorage.getItem(LS_KEY);
  if(saved){ try{ rows = JSON.parse(saved); }catch{ rows = DEFAULT_DATA.map(toObj); } }
  else { rows = DEFAULT_DATA.map(toObj); }
  buildGroupFilter();
  applyFilters();
}

function buildGroupFilter(){
  const sel = document.getElementById('group-filter');
  const tables = [...new Set(rows.map(r=>r.table).filter(Boolean))];
  sel.innerHTML = '<option value="">すべて</option>';
  tables.forEach(t => { const o=document.createElement('option'); o.value=o.textContent=t; sel.appendChild(o); });
}

// ─── EFFECTIVE TABLE NAME ─────────────────────────────────────────────────────
function effectiveTable(){
  let last='';
  return rows.map(r=>{ if(r.table) last=r.table; return last; });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function applyFilters(){
  const q   = (document.getElementById('search-box').value||'').trim().toLowerCase();
  const grp = document.getElementById('group-filter').value;
  const dt  = document.getElementById('dtype-filter').value;
  const colFilters = [...document.querySelectorAll('#filter-row input[data-col]')].map(i=>i.value.toLowerCase());
  const effTbl = effectiveTable();

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let rowNo = 0;

  rows.forEach((r, ri)=>{
    const eff = effTbl[ri];
    if(grp && eff !== grp) return;
    if(dt && r.dtype !== dt) return;
    // column filters
    const cells = [eff, r.field, r.display, '', '', '', '', r.validation, r.notes];
    for(let ci=0;ci<colFilters.length;ci++){
      if(colFilters[ci] && !(cells[ci]||'').toLowerCase().includes(colFilters[ci])) return;
    }
    // global search
    if(q){
      const hay = [eff,r.field,r.display,r.validation,r.notes].join(' ').toLowerCase();
      if(!hay.includes(q)) return;
    }
    rowNo++;
    const bg = rowColor(eff);
    const tr = document.createElement('tr');
    tr.dataset.ri = ri;
    tr.style.background = bg;
    tr.draggable = true;
    tr.addEventListener('dragstart', e=>onDragStart(e,ri));
    tr.addEventListener('dragover',  e=>onDragOver(e,ri));
    tr.addEventListener('dragleave', e=>onDragLeave(e));
    tr.addEventListener('drop',      e=>onDrop(e,ri));
    tr.addEventListener('dragend',   e=>onDragEnd(e));

    // drag handle
    const tdDrag = document.createElement('td'); tdDrag.className='td-drag'; tdDrag.textContent='⠿'; tr.appendChild(tdDrag);

    // text cells: table(0), field(1), display(2)
    [[r.table,'col-tbl',0],[r.field,'col-field',1],[r.display,'',2]].forEach(([val,cls,ci])=>{
      const td=document.createElement('td');
      if(cls) td.className=cls;
      td.contentEditable='true';
      td.dataset.ri=ri; td.dataset.ci=ci;
      td.style.background=bg;
      td.innerHTML = q ? highlight(val,q) : escHtml(val);
      td.addEventListener('focus',()=>{ selectedRow=ri; selectedCol=ci; editBeforeVal=val; td.classList.add('cell-sel'); });
      td.addEventListener('blur', ()=>{ td.classList.remove('cell-sel'); commitText(td,ri,ci); });
      td.addEventListener('keydown', onCellKey);
      tr.appendChild(td);
    });

    // boolean cells: required(3), ix(4)
    [[r.required,3],[r.ix,4]].forEach(([val,ci])=>{
      const td=document.createElement('td'); td.className='td-bool'; td.dataset.ri=ri; td.dataset.ci=ci;
      td.style.background=bg;
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=val;
      cb.addEventListener('change',()=>{ rows[ri][COLS[ci]]=cb.checked; autoSave(); });
      td.addEventListener('click',e=>{ if(e.target===td){ cb.checked=!cb.checked; rows[ri][COLS[ci]]=cb.checked; autoSave(); } });
      td.appendChild(cb); tr.appendChild(td);
    });

    // select: dtype(5)
    const tdSel=document.createElement('td'); tdSel.className='td-sel'; tdSel.dataset.ri=ri; tdSel.dataset.ci=5;
    tdSel.style.background=bg;
    const sel=document.createElement('select'); sel.className='dtype-sel dtype-'+r.dtype;
    DTYPES.forEach(dt=>{ const o=document.createElement('option'); o.value=o.textContent=dt; if(dt===r.dtype) o.selected=true; sel.appendChild(o); });
    sel.addEventListener('change',()=>{ rows[ri].dtype=sel.value; sel.className='dtype-sel dtype-'+sel.value; autoSave(); });
    tdSel.appendChild(sel); tr.appendChild(tdSel);

    // boolean: list(6)
    const tdList=document.createElement('td'); tdList.className='td-bool'; tdList.dataset.ri=ri; tdList.dataset.ci=6;
    tdList.style.background=bg;
    const cbList=document.createElement('input'); cbList.type='checkbox'; cbList.checked=r.list;
    cbList.addEventListener('change',()=>{ rows[ri].list=cbList.checked; autoSave(); });
    tdList.addEventListener('click',e=>{ if(e.target===tdList){ cbList.checked=!cbList.checked; rows[ri].list=cbList.checked; autoSave(); } });
    tdList.appendChild(cbList); tr.appendChild(tdList);

    // text cells: validation(7), notes(8)
    [[r.validation,7],[r.notes,8]].forEach(([val,ci])=>{
      const td=document.createElement('td');
      td.contentEditable='true'; td.dataset.ri=ri; td.dataset.ci=ci;
      td.style.background=bg;
      td.innerHTML = q ? highlight(val,q) : escHtml(val);
      td.addEventListener('focus',()=>{ selectedRow=ri; selectedCol=ci; editBeforeVal=val; td.classList.add('cell-sel'); });
      td.addEventListener('blur', ()=>{ td.classList.remove('cell-sel'); commitText(td,ri,ci); });
      td.addEventListener('keydown', onCellKey);
      tr.appendChild(td);
    });

    // actions
    const tdAct=document.createElement('td'); tdAct.className='td-act';
    const btnAdd=document.createElement('button'); btnAdd.className='btn-add-row'; btnAdd.title='この行の下に追加'; btnAdd.textContent='+';
    btnAdd.addEventListener('click',()=>insertRowAfter(ri));
    const btnDel=document.createElement('button'); btnDel.className='btn-del-row'; btnDel.title='この行を削除'; btnDel.textContent='−';
    btnDel.addEventListener('click',()=>deleteRow(ri));
    tdAct.appendChild(btnAdd); tdAct.appendChild(btnDel); tr.appendChild(tdAct);

    tbody.appendChild(tr);
  });

  document.getElementById('status-left').textContent = `${rowNo} / ${rows.length} 行表示`;
  document.getElementById('row-count').textContent = `全 ${rows.length} 行`;
}

// ─── CELL COMMIT ─────────────────────────────────────────────────────────────
function commitText(td, ri, ci){
  const val = td.innerText;
  rows[ri][COLS[ci]] = val;
  const q = document.getElementById('search-box').value.toLowerCase();
  td.innerHTML = q ? highlight(val,q) : escHtml(val);
  if(ci === 0){ buildGroupFilter(); }
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlight(s,q){
  const esc=escHtml(s||'');
  if(!q) return esc;
  return esc.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

// ─── KEYBOARD NAV ─────────────────────────────────────────────────────────────
const TEXT_CIS = [0,1,2,7,8];
function onCellKey(e){
  const td=e.currentTarget; const ri=parseInt(td.dataset.ri); const ci=parseInt(td.dataset.ci);
  if(e.key==='Escape'){ e.preventDefault(); rows[ri][COLS[ci]]=editBeforeVal; td.innerText=editBeforeVal; td.blur(); }
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); commitText(td,ri,ci); moveTo(ri+1,ci); }
  if(e.key==='Tab'){ e.preventDefault(); commitText(td,ri,ci); e.shiftKey?moveTo(ri,ci-1):moveTo(ri,ci+1); }
}
function moveTo(ri,ci){
  const tgt = document.querySelector(`#tbody td[data-ri="${ri}"][data-ci="${ci}"]`);
  if(tgt&&tgt.contentEditable==='true'){ tgt.focus(); tgt.scrollIntoView({block:'nearest'}); }
}

// ─── DRAG & DROP ─────────────────────────────────────────────────────────────
function onDragStart(e,ri){ dragSrcRi=ri; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function onDragOver(e,ri){ e.preventDefault(); e.dataTransfer.dropEffect='move'; document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('drag-over')); if(ri!==dragSrcRi) e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e,ri){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if(dragSrcRi===-1||dragSrcRi===ri) return; const m=rows.splice(dragSrcRi,1)[0]; rows.splice(dragSrcRi<ri?ri-1:ri,0,m); dragSrcRi=-1; applyFilters(); autoSave(); toast('並び替えました'); }
function onDragEnd(e){ document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('drag-over','dragging')); dragSrcRi=-1; }

// ─── ROW OPS ─────────────────────────────────────────────────────────────────
function insertRowAfter(ri){
  rows.splice(ri+1,0,{id:String(parseInt(rows[ri].id||0)+1),table:'',field:'',display:'',required:false,ix:false,dtype:'text',list:false,validation:'',notes:''});
  applyFilters(); autoSave();
  setTimeout(()=>{ const t=document.querySelector(`#tbody td[data-ri="${ri+1}"][data-ci="1"]`); if(t){t.focus();t.scrollIntoView({block:'nearest'});} },50);
  toast('行を追加しました');
}
function deleteRow(ri){
  if(!confirm(`フィールド "${rows[ri].field||'(空)'}" を削除しますか？`)) return;
  rows.splice(ri,1); applyFilters(); autoSave(); toast('削除しました');
}

// ─── FILE SYSTEM SAVE ────────────────────────────────────────────────────────
function linkFile(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.html';
  input.onchange=async()=>{
    const file=input.files[0]; if(!file) return;
    const ok=confirm(`「${file.name}」を上書き保存します。よろしいですか？`);
    if(!ok) return;
    _fileHtmlCache=await file.text();
    _fileName=file.name;
    saveToFile();
  };
  input.click();
}
function saveToFile(){
  if(!_fileHtmlCache||!_fileName){ toast('先に「📂 ファイルをリンク」してください'); return; }
  const dataStr=JSON.stringify(rows.map(r=>[r.id,r.table,r.field,r.display,r.required,r.ix,r.dtype,r.list,r.validation,r.notes]));
  const updated=_fileHtmlCache.replace(/const DEFAULT_DATA = \[[\s\S]*?\];/,'const DEFAULT_DATA = '+dataStr+';');
  _fileHtmlCache=updated;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([updated],{type:'text/html'}));
  a.download=_fileName; a.click(); URL.revokeObjectURL(a.href);
  updateFileBadge('✓ 保存済み',2000);
  toast('保存しました: '+_fileName);
}
function updateFileBadge(text,resetMs){
  const el=document.getElementById('file-badge'); el.textContent=text;
  if(resetMs) setTimeout(()=>{ el.textContent=_fileName?'🔗 '+_fileName:''; },resetMs);
}
function autoSave(){
  localStorage.setItem(LS_KEY,JSON.stringify(rows));
}
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='s'){ e.preventDefault(); saveToFile(); } });

// ─── EXPORT MD ───────────────────────────────────────────────────────────────
function exportMd(){
  const eff=effectiveTable();
  const lines=['# Rincle DB設計書\n','| # | テーブル | フィールド名 | 表示名 | 必須 | index | データ型 | List | バリデーション | 備考 |','|---|---------|-------------|------|------|-------|--------|------|-------------|------|'];
  rows.forEach((r,ri)=>{ lines.push(`| ${r.id} | ${eff[ri]} | ${r.field} | ${r.display} | ${r.required?'✓':''} | ${r.ix?'✓':''} | ${r.dtype} | ${r.list?'✓':''} | ${r.validation} | ${r.notes} |`); });
  const blob=new Blob([lines.join('\n')],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='db.md'; a.click();
  toast('db.md をダウンロードしました');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

function initColResize(){
  document.querySelectorAll('#ss thead tr.hd-main th').forEach(th=>{
    if(th.classList.contains('th-drag')||th.classList.contains('th-act')) return;
    const h=document.createElement('div'); h.className='col-resizer'; th.appendChild(h);
    h.addEventListener('mousedown',e=>{
      e.preventDefault();
      const sx=e.clientX, sw=th.offsetWidth; h.classList.add('resizing');
      const mv=e=>{th.style.width=Math.max(36,sw+e.clientX-sx)+'px';th.style.minWidth=th.style.width;};
      const up=()=>{h.classList.remove('resizing');window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
    });
  });
}

// ─── PAGE TABS ────────────────────────────────────────────────────────────────
function switchPageTab(tab){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.ptab===tab));
  document.getElementById('db-section').classList.toggle('hidden', tab!=='db');
  document.getElementById('os-section').classList.toggle('active', tab==='os');
}

function initOs(){ applyOsFilters(); }

function applyOsFilters(){
  const q=(document.getElementById('os-search').value||'').trim().toLowerCase();
  const container=document.getElementById('os-container');
  container.innerHTML='';
  let shown=0;

  OS_DATA.forEach(os=>{
    if(q){
      const hay=[os.name,...os.attrs.map(a=>a.label+' '+a.type),
        ...(os.options||[]).flatMap(o=>[o.display,...(o.vals||[])]),
        os.notes||''].join(' ').toLowerCase();
      if(!hay.includes(q)) return;
    }
    shown++;

    // ── Card ──
    const card=document.createElement('div'); card.className='card os-card';

    // Header
    const hd=document.createElement('div'); hd.className='card-hd';
    const attrSummary = os.attrs.length
      ? '<span style="font-size:11px;color:#8870a8;font-weight:400;margin-left:10px">属性: '+os.attrs.map(a=>`${a.label}(${a.type})`).join(', ')+'</span>'
      : '<span style="font-size:11px;color:#555568;font-weight:400;margin-left:10px">Display のみ</span>';
    hd.innerHTML = `<span>${os.name}</span>${attrSummary}`
      +(os.notes?`<span style="font-size:11px;color:#6678aa;font-weight:400;margin-left:auto">${os.notes}</span>`:'');
    card.appendChild(hd);

    // Body
    if(os.abbrev){
      const p=document.createElement('div'); p.className='os-abbrev'; p.textContent=os.abbrev;
      card.appendChild(p);
    } else if(os.options && os.options.length){
      const tbl=document.createElement('table'); tbl.className='os-card-tbl';
      // thead
      const thead=document.createElement('thead'), tr0=document.createElement('tr');
      const thD=document.createElement('th'); thD.className='otha-display'; thD.textContent='Display'; tr0.appendChild(thD);
      os.attrs.forEach(a=>{
        const th=document.createElement('th'); th.className='otha-attr';
        th.innerHTML=`${a.label} <span style="color:#666;font-weight:400">(${a.type})</span>`;
        tr0.appendChild(th);
      });
      thead.appendChild(tr0); tbl.appendChild(thead);
      // tbody
      const tbody=document.createElement('tbody');
      os.options.forEach((opt,oi)=>{
        const tr=document.createElement('tr');
        tr.style.background=oi%2===0?'#1e2030':'#1a1c2a';
        const tdD=document.createElement('td'); tdD.className='td-display';
        tdD.textContent=typeof opt==='string'?opt:opt.display;
        tr.appendChild(tdD);
        if(typeof opt!=='string' && os.attrs.length){
          os.attrs.forEach((_,ai)=>{
            const td=document.createElement('td'); td.className='td-attr';
            td.textContent=(opt.vals&&opt.vals[ai]!=null)?opt.vals[ai]:'';
            tr.appendChild(td);
          });
        }
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      card.appendChild(tbl);
    }
    container.appendChild(card);
  });

  document.getElementById('os-status').textContent=`${shown} / ${OS_DATA.length} 件`;
}
