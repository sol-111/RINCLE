<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincle ER図</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:13px;background:#212124;color:#c0c0cc;display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
#topbar{position:sticky;top:0;z-index:100;background:#2a2a2f;padding:6px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #38383f;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0}
#topbar h1{font-size:14px;font-weight:700;color:#d0d0d8;white-space:nowrap}
.btn{padding:4px 12px;border:1px solid #444450;border-radius:4px;background:#38383f;color:#a0a0b8;font-size:11px;cursor:pointer;transition:all .15s}
.btn:hover{background:#444450;color:#d0d0d8}

/* ── PAGE TABS ── */
#page-tabs{display:flex;align-items:stretch;background:#252528;border-bottom:1px solid #38383f;padding:0 14px;gap:2px;flex-shrink:0}
.ptab{display:flex;align-items:center;gap:6px;padding:0 16px;height:34px;border:none;background:transparent;color:#686880;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.ptab:hover{color:#b0b0cc}
.ptab.active{color:#90b8f0;border-bottom-color:#4a8ad8}

/* ── PAGE BODY ── */
#page-body{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── SECTIONS ── */
#dt-section{flex:1;display:none;padding:14px;overflow:hidden;flex-direction:column}
#dt-section.active{display:flex}
#os-section-er{flex:1;display:none;padding:14px;overflow-y:auto}
#os-section-er.active{display:block}

/* ── ER CANVAS WRAP ── */
#er-wrap{position:relative;width:100%;flex:1;min-height:300px;border:1.5px solid #2a4a7a;border-radius:6px;overflow:hidden;background:#181820;cursor:grab}
#er-wrap:active{cursor:grabbing}
#er-canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#er-svg{position:absolute;top:0;left:0;pointer-events:none;width:2000px;height:2600px}
.er-line{stroke:#384858;stroke-width:1.5;fill:none}
.er-line-ref{stroke:#2a5a6a}
.zoom-btns{position:absolute;bottom:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zoom-btns button{width:28px;height:28px;border:1px solid #38383f;border-radius:4px;background:#2a2a2f;color:#a0a0b8;font-size:16px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.zoom-btns button:hover{background:#444450;color:#fff}

/* ── TABLE BOXES ── */
.er-tbl{position:absolute;width:260px;background:#1c1e26;border:1px solid #3a3a50;border-radius:4px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.6);font-size:11px;user-select:none}
.er-tbl.named .er-hd{background:#1a3050;border-bottom:1px solid #2a4870}
.er-tbl.obfuscated .er-hd{background:#302010;border-bottom:1px solid #504020}
.er-hd{padding:5px 8px;font-weight:700;font-size:12px;color:#d0d8ec;text-align:center;font-family:monospace}
.er-row{display:grid;grid-template-columns:26px 1fr 80px;gap:0 3px;padding:2px 5px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;min-height:20px}
.er-badge{font-size:9px;font-weight:700;text-align:center;padding:1px 3px;border-radius:2px;width:22px;display:inline-block}
.er-badge.pk{background:#382800;color:#ffb74d}
.er-badge.fk{background:#0a2828;color:#80cbc4}
.er-fname{color:#b0b0c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er-ftype{color:#6a7a8a;font-size:10px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er-ftype.ft-text{color:#5a90c0}
.er-ftype.ft-number{color:#5a9060}
.er-ftype.ft-date{color:#a07040}
.er-ftype.ft-boolean{color:#8060a0}
.er-ftype.ft-image{color:#a06080}
.er-ftype.ft-ref{color:#50a0a0}
.er-ftype.ft-option{color:#a09050}

/* ── OPTION SET SECTION ── */#os-grid{display:flex;flex-wrap:wrap;gap:12px}
.os-mini-card{background:#1e1820;border:1px solid #3a2838;border-radius:4px;overflow:hidden;min-width:140px;flex:0 0 auto}
.os-mini-hd{padding:4px 10px;font-weight:700;font-size:11px;font-family:monospace;background:#2a1a28;color:#c8a0d8;border-bottom:1px solid #3a2838;text-align:center}
.os-mini-tbl{border-collapse:collapse;width:100%;font-size:11px}
.os-mini-tbl thead th{background:#1e1620;color:#9090a8;padding:3px 8px;border-right:1px solid rgba(255,255,255,.05);font-size:10px;font-weight:700;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.06)}
.os-mini-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
.os-mini-tbl tbody td{padding:3px 8px;border-right:1px solid rgba(255,255,255,.04);color:#c0c0cc;white-space:nowrap}
.os-mini-abbrev{padding:6px 10px;color:#7a7a8a;font-size:11px;font-style:italic}
</style>
</head>
<body>

<div id="topbar">
  <h1>🔗 Rincle ER図</h1>
  <button class="btn" id="btn-fit" onclick="erFit()" style="display:none">全体表示</button>
  <button class="btn" id="btn-zoom-in" onclick="erZoom(1.25)" style="display:none">拡大</button>
  <button class="btn" id="btn-zoom-out" onclick="erZoom(0.8)" style="display:none">縮小</button>
</div>

<div id="page-tabs">
  <button class="ptab active" data-ptab="dt" onclick="switchErTab('dt')">Data Type</button>
  <button class="ptab" data-ptab="os" onclick="switchErTab('os')">Option Set</button>
</div>

<div id="page-body">
  <div id="dt-section" class="active">
    <div id="er-wrap">
      <div id="er-canvas">
        <svg id="er-svg"><defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a6a80"/></marker><marker id="arr-many" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M12,0 L0,4 L12,8" fill="none" stroke="#4a6a80" stroke-width="1.2"/></marker></defs></svg>
      </div>
      <div class="zoom-btns">
        <button onclick="erZoom(1.25)" title="拡大">+</button>
        <button onclick="erZoom(0.8)" title="縮小">−</button>
        <button onclick="erFit()" title="全体表示" style="font-size:11px">⊡</button>
      </div>
    </div>
  </div>

  <div id="os-section-er">
    <div id="os-grid"></div>
  </div>
</div>

<script>
// ─── SCHEMA ────────────────────────────────────────────────────────────────────
// fields: {f:internal, d:display, t:type, r?:ref_table, o?:option_set, l?:list}
const TABLES = {
  user:{kind:'named',fields:[
    {d:'事業者名',t:'text'},{d:'氏名',t:'text'},{d:'氏名（カナ）',t:'text'},
    {d:'店舗名',t:'text'},{d:'店舗住所',t:'text'},{d:'連絡用メール',t:'text'},

    {d:'Pay.JP 顧客ID',t:'text'},{d:'Pay.JP 公開鍵',t:'text'},
    {d:'オンボーディング完了',t:'boolean'},{d:'カート参照',t:'ref',r:'reservation'},
    {d:'都道府県',t:'ref',r:'prefecture'},{d:'アクセス権限',t:'option',o:'rights'},
    {d:'ブランドレビュー',t:'option',o:'brand_status'},{d:'支払い方法',t:'option',o:'支払い方法',l:true},
  ]},

    {d:'自転車名',t:'text'},{d:'ブランド名',t:'text'},{d:'カラー',t:'text'},
    {d:'サイズ',t:'text'},{d:'シリアル番号',t:'text'},{d:'コメント',t:'text'},
    {d:'管理番号',t:'number'},{d:'最大貸出日数',t:'number'},
    {d:'電動アシスト',t:'boolean'},{d:'アーカイブ済み',t:'boolean'},
    {d:'画像',t:'image',l:true},{d:'時間単価',t:'number'},{d:'日単価',t:'number'},
    {d:'週単価',t:'number'},{d:'月単価',t:'number'},{d:'税率',t:'number'},
    {d:'所属ショップ',t:'ref',r:'user'},{d:'料金プラン',t:'ref',r:'price_menu'},
    {d:'自転車カテゴリ',t:'option',o:'bicycle_category'},
  ]},
  price_menu:{kind:'named',fields:[
    {d:'プラン名',t:'text'},{d:'デフォルトフラグ',t:'boolean'},{d:'シミュレーション用',t:'boolean'},
    {d:'時間単価',t:'number'},{d:'日単価',t:'number'},{d:'週単価',t:'number'},
    {d:'月単価',t:'number'},{d:'2週間単価',t:'number'},{d:'3週間単価',t:'number'},
    {d:'追加日単価',t:'number'},{d:'追加時間単価',t:'number'},{d:'税率',t:'number'},

  ]},

  ]},
  sub_option:{kind:'named',fields:[
    {d:'サブオプション名',t:'text'},{d:'説明',t:'text'},{d:'最大数量',t:'number'},
    {d:'アーカイブ済み',t:'boolean'},
    {d:'時間単価',t:'number'},{d:'日単価',t:'number'},{d:'週単価',t:'number'},
    {d:'月単価',t:'number'},{d:'税率',t:'number'},
    {d:'親オプション',t:'ref',r:'option'},{d:'対応自転車',t:'ref',r:'bicycle',l:true},
    {d:'所属ショップ',t:'ref',r:'user'},
  ]},
  prefecture:{kind:'named',fields:[
    {d:'都道府県名',t:'text'},{d:'ソート順',t:'number'},
    {d:'所属ショップ',t:'ref',r:'user'},{d:'該当ショップ一覧',t:'ref',r:'user',l:true},
  ]},
  q_a_category:{kind:'named',fields:[
    {d:'カテゴリ名',t:'text'},{d:'表示順',t:'number'},
  ]},
  q_a:{kind:'named',fields:[
    {d:'タイトル',t:'text'},{d:'質問',t:'text'},{d:'回答',t:'text'},
    {d:'表示フラグ',t:'boolean'},{d:'表示順①',t:'number'},{d:'表示順②',t:'number'},
    {d:'カテゴリ',t:'ref',r:'q_a_category'},
  ]},
  news:{kind:'named',fields:[
    {d:'タイトル',t:'text'},{d:'本文',t:'text'},{d:'内部ページフラグ',t:'boolean'},
    {d:'内部ページコンテンツ',t:'text'},{d:'外部URL',t:'text'},
    {d:'表示権限',t:'option',o:'rights'},
  ]},
  banner:{kind:'named',fields:[
    {d:'タイトル',t:'text'},{d:'説明文',t:'text'},{d:'外部URL',t:'text'},
    {d:'バナー画像',t:'image'},{d:'内部ページフラグ',t:'boolean'},{d:'内部ページコンテンツ',t:'text'},
  ]},
  fv:{kind:'named',fields:[
    {d:'タイトル',t:'text'},{d:'外部URL',t:'text'},
    {d:'画像',t:'image'},{d:'内部ページフラグ',t:'boolean'},{d:'内部ページコンテンツ',t:'text'},
  ]},
  holidays:{kind:'named',fields:[
    {d:'日付',t:'date'},
  ]},
  access_log:{kind:'named',fields:[
    {d:'アクセス日時',t:'date'},{d:'IPアドレス',t:'text'},
  ]},
  webhook_event:{kind:'named',fields:[
    {d:'イベント本文',t:'text'},{d:'イベント種別',t:'text'},
  ]},
  // ─── 難読化テーブル ───
  reservation:{kind:'obfuscated',fields:[
    {d:'予約番号',t:'number'},{d:'貸出日',t:'date'},{d:'返却日',t:'date'},
    {d:'合計金額',t:'number'},{d:'延長料金',t:'number'},
    {d:'Pay.JP チャージID',t:'text'},{d:'決済トークン',t:'text'},
    {d:'ユーザー',t:'ref',r:'user'},
    {d:'予約明細リスト',t:'ref',r:'reservation_detail',l:true},
    {d:'オプション価格リスト',t:'ref',r:'option_price',l:true},
    {d:'決済ステータス',t:'option',o:'決済ステータス'},
  ]},
  booking_customer:{kind:'obfuscated',fields:[
    {d:'氏名',t:'text'},{d:'氏名（カナ）',t:'text'},
    {d:'メールアドレス',t:'text'},{d:'電話番号',t:'text'},
    {d:'住所',t:'text'},{d:'会員登録フラグ',t:'boolean'},
  ]},
  reservation_detail:{kind:'obfuscated',fields:[
    {d:'貸出日',t:'date'},{d:'返却日',t:'date'},
    {d:'合計金額',t:'number'},{d:'金額①',t:'number'},{d:'金額②',t:'number'},
    {d:'自転車',t:'ref',r:'bicycle'},{d:'料金プラン',t:'ref',r:'price_menu'},
    {d:'予約参照',t:'ref',r:'reservation'},{d:'顧客情報参照',t:'ref',r:'booking_customer'},
    {d:'オプション価格リスト',t:'ref',r:'option_price',l:true},
    {d:'ユーザー',t:'ref',r:'user'},
  ]},
  option_price:{kind:'obfuscated',fields:[
    {d:'金額',t:'number'},{d:'料金プラン',t:'ref',r:'price_menu'},
    {d:'サブオプション',t:'ref',r:'sub_option'},
  ]},
  shop_schedule:{kind:'obfuscated',fields:[
    {d:'対象日',t:'date'},{d:'開始時間',t:'option',o:'time'},{d:'終了時間',t:'option',o:'time'},
    {d:'スケジュール区分',t:'option',o:'営業状態op'},
    {d:'所属ショップ',t:'ref',r:'user'},{d:'対象自転車リスト',t:'ref',r:'bicycle',l:true},
  ]},
  business_hours:{kind:'obfuscated',fields:[
    {d:'開始日',t:'date'},{d:'終了日',t:'date'},
    {d:'開始時間',t:'option',o:'time'},{d:'終了時間',t:'option',o:'time'},
    {d:'スケジュール区分',t:'option',o:'営業状態op'},
    {d:'曜日区分',t:'option',o:'曜日'},{d:'フラグ',t:'boolean'},
    {d:'所属ショップ',t:'ref',r:'user'},
  ]},
  sales_record:{kind:'obfuscated',fields:[
    {d:'記録日',t:'date'},{d:'金額①',t:'number'},{d:'金額②',t:'number'},
    {d:'金額③',t:'number'},{d:'処理済みフラグ',t:'boolean'},
    {d:'所属ショップ',t:'ref',r:'user'},
  ]},
  shop_notification:{kind:'obfuscated',fields:[
    {d:'既読フラグ',t:'boolean'},{d:'所属ショップ',t:'ref',r:'user'},
    {d:'表示権限',t:'option',o:'rights'},{d:'通知種別',t:'option',o:'管理者/運営_news_type'},
  ]},
  contact_inquiry:{kind:'obfuscated',fields:[
    {d:'氏名',t:'text'},{d:'メールアドレス',t:'text'},{d:'本文',t:'text'},
    {d:'対応済みフラグ',t:'boolean'},{d:'ユーザー参照',t:'ref',r:'user'},
  ]},
};

// ─── POSITIONS (x, y in px) ─────────────────────────────────────────────────
const POS = {
  user:             {x:30,   y:30},
  bicycle:          {x:330,  y:30},
  price_menu:       {x:630,  y:30},
  option:           {x:930,  y:30},
  sub_option:       {x:930,  y:280},
  prefecture:       {x:30,   y:700},
  q_a_category:     {x:330,  y:700},
  q_a:              {x:630,  y:700},
  news:             {x:930,  y:700},
  banner:           {x:930,  y:950},
  fv:               {x:1230, y:30},
  holidays:         {x:1230, y:220},
  access_log:       {x:1230, y:370},
  webhook_event:    {x:1230, y:510},
  reservation:      {x:30,   y:1100},
  booking_customer: {x:30,   y:1500},
  reservation_detail:{x:330, y:1100},
  option_price:     {x:630,  y:1100},
  shop_schedule:    {x:930,  y:1100},
  business_hours:   {x:930,  y:1370},
  sales_record:     {x:330,  y:1600},
  shop_notification:{x:630,  y:1600},
  contact_inquiry:  {x:30,   y:1900},
};

// ─── EDGES (from → to, relation type) ───────────────────────────────────────
const EDGES = [
  {f:'bicycle',     t:'user',              rel:'shop →'},
  {f:'bicycle',     t:'price_menu',        rel:'price_menu →'},
  {f:'sub_option',  t:'bicycle',           rel:'bicycles →'},
  {f:'sub_option',  t:'option',            rel:'parent →'},
  {f:'sub_option',  t:'user',              rel:'shop →'},
  {f:'option',      t:'user',              rel:'shop →'},
  {f:'prefecture',  t:'user',              rel:'shop →'},
  {f:'price_menu',  t:'user',              rel:'shop →'},
  {f:'q_a',         t:'q_a_category',      rel:'category →'},
  {f:'shop_schedule',t:'user',             rel:'shop →'},
  {f:'shop_schedule',t:'bicycle',          rel:'bicycles →'},
  {f:'business_hours',t:'user',            rel:'shop →'},
  {f:'sales_record', t:'user',             rel:'shop →'},
  {f:'shop_notification',t:'user',         rel:'shop →'},
  {f:'contact_inquiry',t:'user',           rel:'user →'},
  {f:'reservation', t:'user',              rel:'user →'},
  {f:'reservation', t:'reservation_detail',rel:'details →'},
  {f:'reservation', t:'option_price',      rel:'options →'},
  {f:'reservation_detail',t:'bicycle',     rel:'bicycle →'},
  {f:'reservation_detail',t:'price_menu',  rel:'price_menu →'},
  {f:'reservation_detail',t:'booking_customer',rel:'customer →'},
  {f:'reservation_detail',t:'reservation', rel:'reservation →'},
  {f:'reservation_detail',t:'option_price',rel:'options →'},
  {f:'reservation_detail',t:'user',        rel:'user →'},
  {f:'option_price',t:'price_menu',        rel:'price_menu →'},
  {f:'option_price',t:'sub_option',        rel:'sub_option →'},
];

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
const CANVAS_W = 1560, CANVAS_H = 2400;
let tx=10, ty=10, sc=0.65, dragging=false, mx0, my0;
const wrap = document.getElementById('er-wrap');
const canvas = document.getElementById('er-canvas');

function applyT(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`; }

wrap.addEventListener('mousedown', e=>{
  if(e.button!==0||e.target.closest('.zoom-btns')) return;
  dragging=true; mx0=e.clientX-tx; my0=e.clientY-ty; e.preventDefault();
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  tx=e.clientX-mx0; ty=e.clientY-my0; applyT();
});
window.addEventListener('mouseup', ()=>dragging=false);
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15;
  sc=Math.min(3,Math.max(0.15,sc*f));
  applyT();
},{passive:false});

function erZoom(f){ sc=Math.min(3,Math.max(0.15,sc*f)); applyT(); }
function erFit(){
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  sc=Math.min(ww/CANVAS_W, wh/CANVAS_H)*0.9;
  tx=(ww-CANVAS_W*sc)/2; ty=(wh-CANVAS_H*sc)/2;
  applyT();
}

// ─── TABLE BOX HEIGHTS (for line drawing) ────────────────────────────────────
const BOX_W = 260;
const ROW_H = 20;
const HDR_H = 27;
function boxHeight(id){ return HDR_H + ROW_H + TABLES[id].fields.length*ROW_H; }

// ─── RENDER TABLES ────────────────────────────────────────────────────────────
function renderTables(){
  Object.entries(TABLES).forEach(([id, tbl])=>{
    const pos = POS[id]; if(!pos) return;
    const box = document.createElement('div');
    box.className = 'er-tbl '+tbl.kind;
    box.id = 'tbl-'+id;
    box.style.cssText = `left:${pos.x}px;top:${pos.y}px`;

    const hd = document.createElement('div');
    hd.className = 'er-hd'; hd.textContent = id;
    box.appendChild(hd);

    // PK row (Unique id — always in Bubble)
    box.appendChild(mkRow('PK','Unique id','text'));

    tbl.fields.forEach(f=>{
      const isFK = f.t==='ref';
      const type = f.t==='ref' ? (f.l?'List ':'')+f.r : f.t==='option' ? f.o : (f.l?'List ':'')+f.t;
      box.appendChild(mkRow(isFK?'FK':'', f.d, type||f.t, isFK?'fk':'', f.t));
    });
    canvas.appendChild(box);
  });
}

function mkRow(badge, name, type, badgeClass='', typeClass=''){
  const row = document.createElement('div'); row.className='er-row';
  const b = document.createElement('span');
  b.className='er-badge '+(badge?badgeClass:'');
  b.textContent=badge;
  const n = document.createElement('span'); n.className='er-fname'; n.textContent=name;
  const t = document.createElement('span'); t.className='er-ftype ft-'+(typeClass||type.split(' ').pop()); t.textContent=type;
  row.appendChild(b); row.appendChild(n); row.appendChild(t);
  return row;
}

// ─── DRAW CONNECTIONS ─────────────────────────────────────────────────────────
function getBox(id){
  const p=POS[id]; if(!p) return null;
  const h=boxHeight(id);
  return { x:p.x, y:p.y, w:BOX_W, h,
    L:{x:p.x,       y:p.y+h/2},
    R:{x:p.x+BOX_W, y:p.y+h/2},
    T:{x:p.x+BOX_W/2, y:p.y},
    B:{x:p.x+BOX_W/2, y:p.y+h}
  };
}

function drawLines(){
  const svg = document.getElementById('er-svg');
  // Clear existing paths (keep defs)
  [...svg.querySelectorAll('path:not(defs path),line')].forEach(el=>el.remove());

  EDGES.forEach(({f,t})=>{
    const s=getBox(f), tg=getBox(t); if(!s||!tg) return;
    let x1,y1,x2,y2;
    const sc_cx = s.x+s.w/2, tc_cx = tg.x+tg.w/2;
    const sc_cy = s.y+s.h/2, tc_cy = tg.y+tg.h/2;

    if(tg.x > s.x+s.w-10){       // target right of source
      x1=s.R.x; y1=s.R.y; x2=tg.L.x; y2=tg.L.y;
    } else if(tg.x+tg.w < s.x+10){ // target left of source
      x1=s.L.x; y1=s.L.y; x2=tg.R.x; y2=tg.R.y;
    } else if(tg.y > s.y+s.h-10){ // target below
      x1=s.B.x; y1=s.B.y; x2=tg.T.x; y2=tg.T.y;
    } else {                        // target above
      x1=s.T.x; y1=s.T.y; x2=tg.B.x; y2=tg.B.y;
    }

    const ddx=Math.abs(x2-x1)*0.45+20;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','er-line');
    path.setAttribute('d',`M${x1},${y1} C${x1+(x2>x1?ddx:-ddx)},${y1} ${x2-(x2>x1?ddx:-ddx)},${y2} ${x2},${y2}`);
    path.setAttribute('marker-end','url(#arr)');
    svg.appendChild(path);
  });
}

function renderOptionSets(){
  const grid = document.getElementById('os-grid');
  OS_DATA.forEach(os=>{
    const card = document.createElement('div'); card.className='os-mini-card';
    const hd = document.createElement('div'); hd.className='os-mini-hd'; hd.textContent=os.name;
    card.appendChild(hd);
    if(os.abbrev){
      const p=document.createElement('div'); p.className='os-mini-abbrev'; p.textContent=os.abbrev;
      card.appendChild(p);
    } else if(os.options&&os.options.length){
      const tbl=document.createElement('table'); tbl.className='os-mini-tbl';
      const thead=document.createElement('thead'),hr=document.createElement('tr');
      ['Display',...os.attrs.map(a=>a.label)].forEach(h=>{
        const th=document.createElement('th'); th.textContent=h; hr.appendChild(th);
      });
      thead.appendChild(hr); tbl.appendChild(thead);
      const tbody=document.createElement('tbody');
      os.options.forEach((opt,oi)=>{
        const tr=document.createElement('tr');
        const d=document.createElement('td'); d.textContent=opt.display; tr.appendChild(d);
        if(os.attrs.length&&opt.vals){
          opt.vals.forEach(v=>{ const td=document.createElement('td'); td.textContent=v; tr.appendChild(td); });
        }
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); card.appendChild(tbl);
    }
    grid.appendChild(card);
  });
}

function switchErTab(tab){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.ptab===tab));
  document.getElementById('dt-section').classList.toggle('active', tab==='dt');
  document.getElementById('os-section-er').classList.toggle('active', tab==='os');
  ['btn-fit','btn-zoom-in','btn-zoom-out'].forEach(id=>{
    document.getElementById(id).style.display = tab==='dt' ? '' : 'none';
  });
}
