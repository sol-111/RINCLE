<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincle 画面遷移図</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Segoe UI',-apple-system,sans-serif;font-size:13px;background:#212124;color:#c0c0cc;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#2a2a2f;padding:7px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #38383f;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#topbar h1{font-size:15px;font-weight:700;color:#d0d0d8;white-space:nowrap}
.sep{width:1px;height:18px;background:#38383f}
.btn{padding:4px 12px;border:1px solid #444450;border-radius:4px;background:#38383f;color:#a0a0b8;font-size:11px;cursor:pointer}
.btn:hover{background:#444450;color:#d0d0d8}
#hint{font-size:11px;color:#666678;margin-left:auto}
#legend{position:fixed;bottom:16px;left:16px;background:#2a2a2f;border:1px solid #38383f;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:6px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.5)}
#legend .leg-title{font-size:11px;font-weight:700;color:#888898;margin-bottom:2px}
#legend .leg-row{display:flex;align-items:center;gap:14px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#a0a0b8}
.leg-box{width:30px;height:18px;border-radius:4px;border-width:1.5px;border-style:solid;flex-shrink:0}
.leg-line{display:flex;align-items:center;gap:7px;font-size:11px;color:#a0a0b8}
.leg-arrow{width:36px;height:12px;flex-shrink:0}
#diagram-wrap{flex:1;overflow:hidden;cursor:grab;background:#1a1a1f}
#diagram-wrap:active{cursor:grabbing}
svg{width:100%;height:100%}
.node{cursor:default}
.node rect{transition:filter .15s}
.node:hover rect{filter:brightness(1.3)}
</style>
</head>
<body>
<div id="topbar">
  <h1>📐 Rincle 画面遷移図</h1>
  <div class="sep"></div>
  <button class="btn" onclick="fitView()">全体表示</button>
  <span id="hint">マウスホイールでズーム / ドラッグでパン</span>
</div>
<div id="legend">
  <div class="leg-title">凡例</div>
  <div class="leg-row">
    <div class="leg-item"><div class="leg-box" style="background:#1a3a28;border-color:#34a853"></div>Bubble画面</div>
    <div class="leg-item"><div class="leg-box" style="background:#3a3010;border-color:#c8a030"></div>ポップアップ</div>
    <div class="leg-item"><div class="leg-box" style="background:#1a2a4a;border-color:#4a90d9"></div>外部サービス</div>
  </div>
  <div class="leg-row">
    <div class="leg-line">
      <svg class="leg-arrow" viewBox="0 0 36 12"><defs><marker id="la" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#7a8a9a"/></marker></defs><line x1="0" y1="6" x2="29" y2="6" stroke="#7a8a9a" stroke-width="1.5" marker-end="url(#la)"/></svg>
      進む遷移
    </div>
    <div class="leg-line">
      <svg class="leg-arrow" viewBox="0 0 36 12"><defs><marker id="lb" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#4a5a6a"/></marker></defs><line x1="0" y1="6" x2="29" y2="6" stroke="#4a5a6a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#lb)"/></svg>
      戻る遷移
    </div>
  </div>
</div>
<div id="diagram-wrap">
  <svg id="svg">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#7a8a9a"/>
      </marker>
      <marker id="arr-back" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#5a6a7a"/>
      </marker>
      <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#34a853"/>
      </marker>
    </defs>
    <g id="vp"></g>
  </svg>
</div>
<script>
// ─── COLOR TYPES ──────────────────────────────────────────────────────────────
const T = {
  bubble:   { fill:'#1a3a28', stroke:'#34a853', tc:'#a0e8b8' },
  external: { fill:'#1a2a4a', stroke:'#4a90d9', tc:'#90b8f8' },
  popup:    { fill:'#3a3010', stroke:'#c8a030', tc:'#ffe066' },
};

// ─── NODES ────────────────────────────────────────────────────────────────────
// [id, x, y, w, h, type, label_lines...]
const NODES = [
  // ── Main booking flow ─────────────────────────────────────────────────────
  ['top',        60,  280, 110, 52, 'bubble',   'TOP', '(top_search)'],
  ['search',    230,  280, 120, 52, 'bubble',   '空車検索', '(TOP内)'],
  ['results',   420,  280, 110, 52, 'bubble',   '検索', '結果一覧'],
  ['bicycle',   600,  280, 110, 52, 'bubble',   '自転車', '詳細'],
  ['cart1',     790,  280, 130, 52, 'bubble',   '予約内容①', '(空車確認)'],
  ['cart2',     990,  280, 130, 52, 'bubble',   '予約内容②', '(顧客情報)'],
  ['cart3',    1190,  280, 130, 52, 'bubble',   '予約内容③', '(内容確認)'],
  ['cart4',    1390,  280, 130, 52, 'bubble',   '予約内容④', '(決済)'],
  ['resv',     1590,  280, 110, 52, 'bubble',   '予約', '一覧'],

  // ── Popup / External (above main flow) ───────────────────────────────────
  ['card',     1390,  160, 130, 52, 'popup',    'カード情報', '入力'],
  ['payjp',    1590,  160, 100, 52, 'external', 'Pay.JP'],

  // ── 新着情報 / TOPICS ──────────────────────────────────────────────────────
  ['news_top',  230,  440, 120, 52, 'bubble',   '新着情報', '(TOP内)'],
  ['news_dtl',  420,  440, 110, 52, 'bubble',   '新着情報', '詳細'],
  ['topics_top',230,  510, 120, 52, 'bubble',   'TOPICS', '(TOP内)'],
  ['topics_dtl',420,  510, 110, 52, 'bubble',   'TOPICS', '詳細'],

  // ── 認証 / ユーザー ───────────────────────────────────────────────────────
  ['login',     230,  630, 120, 52, 'popup',    'ログイン', 'ポップアップ'],
  ['signup',    230,  698, 120, 52, 'popup',    '新規登録', 'ポップアップ'],
  ['mypage',    420,  630, 110, 52, 'bubble',   'マイページ'],
  ['edit',      600,  630, 120, 52, 'bubble',   'アカウント', '編集'],
  ['user_resv', 600,  698, 120, 52, 'bubble',   '予約一覧', '(マイページ)'],

  // ── ヘッダーナビ ─────────────────────────────────────────────────────────
  ['guide',     240,  830, 100, 44, 'bubble',   'ガイド'],
  ['howtopay',  355,  830, 110, 44, 'bubble',   '料金・', 'お支払い'],
  ['faq',       480,  830, 110, 44, 'bubble',   'よくある', '質問'],
  ['privacy',   605,  830, 130, 44, 'bubble',   'プライバシー', 'ポリシー'],
  ['contact',   750,  830, 120, 44, 'bubble',   'お問い合わせ'],
];

// ─── EDGES ────────────────────────────────────────────────────────────────────
// [from_side:to_side, from_id, to_id, label, dashed]
const EDGES = [
  // Main flow →
  ['r:l','top','search',''],
  ['r:l','search','results',''],
  ['r:l','results','bicycle',''],
  ['r:l','bicycle','cart1',''],
  ['r:l','cart1','cart2',''],
  ['r:l','cart2','cart3',''],
  ['r:l','cart3','cart4',''],
  ['r:l','cart4','resv',''],

  // Popup / External ↑
  ['t:b','cart4','card',''],
  ['r:l','card','payjp',''],

  // News/Topics (from TOP bottom → angled)
  ['r:l','news_top','news_dtl',''],
  ['r:l','topics_top','topics_dtl',''],

  // Auth
  ['r:l','login','mypage',''],
  ['r:l','mypage','edit',''],
  ['b:t','mypage','user_resv',''],

  // Header nav (from TOP)
  ['r:l','guide','howtopay','', true],
  ['r:l','howtopay','faq','', true],
  ['r:l','faq','privacy','', true],
  ['r:l','privacy','contact','', true],
];

// ─── BUILD NODE MAP ───────────────────────────────────────────────────────────
const NM = {};
NODES.forEach(n => {
  NM[n[0]] = { id:n[0], x:n[1], y:n[2], w:n[3], h:n[4], type:n[5], lines:n.slice(6) };
});

function pt(id, side) {
  const n = NM[id];
  const [cx, cy] = [n.x+n.w/2, n.y+n.h/2];
  return {
    r:[n.x+n.w, cy], l:[n.x, cy],
    t:[cx, n.y],     b:[cx, n.y+n.h],
  }[side];
}

// ─── SVG HELPERS ─────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function nodeEl(n) {
  const t = T[n.type];
  const cx = n.x + n.w/2;
  let labels = '';
  if (n.lines.length === 1) {
    labels = `<text x="${cx}" y="${n.y+n.h/2+4}" text-anchor="middle" fill="${t.tc}" font-size="11">${esc(n.lines[0])}</text>`;
  } else {
    n.lines.forEach((l,i) => {
      const dy = n.y + n.h/2 + (i - (n.lines.length-1)/2)*15 + 4;
      labels += `<text x="${cx}" y="${dy}" text-anchor="middle" fill="${t.tc}" font-size="11">${esc(l)}</text>`;
    });
  }
  return `<g class="node" id="n-${n.id}"><rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="8" fill="${t.fill}" stroke="${t.stroke}" stroke-width="1.5"/>${labels}</g>`;
}

function line(x1,y1,x2,y2,dash=false,marker='arr',strokeColor='#5a6a7a'){
  const d = dash ? ' stroke-dasharray="5,3"' : '';
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${strokeColor}" stroke-width="1.5"${d} marker-end="url(#${marker})"/>`;
}

function orthoPath(fx,fy,tx,ty,dash=false,marker='arr',strokeColor='#5a6a7a'){
  const dashAttr = dash ? ' stroke-dasharray="5,3"' : '';
  let d;
  if(Math.abs(fy-ty) < 2){
    d = `M ${fx} ${fy} H ${tx}`;
  } else if(Math.abs(fx-tx) < 2){
    d = `M ${fx} ${fy} V ${ty}`;
  } else {
    const midX = (fx+tx)/2;
    d = `M ${fx} ${fy} H ${midX} V ${ty} H ${tx}`;
  }
  return `<path d="${d}" fill="none" stroke="${strokeColor}" stroke-width="1.5"${dashAttr} marker-end="url(#${marker})"/>`;
}

function edgeEl(e) {
  const [sides, fid, tid, label, dashed] = e;
  const [fs, ts] = sides.split(':');
  const [fx,fy] = pt(fid, fs);
  const [tx,ty] = pt(tid, ts);
  if(fs==='t'||fs==='b'){
    // vertical-first then horizontal
    const dashAttr = (dashed) ? ' stroke-dasharray="5,3"' : '';
    const midY = (fy+ty)/2;
    const d = Math.abs(fx-tx)<2
      ? `M ${fx} ${fy} V ${ty}`
      : `M ${fx} ${fy} V ${midY} H ${tx} V ${ty}`;
    return `<path d="${d}" fill="none" stroke="#5a6a7a" stroke-width="1.5"${dashAttr} marker-end="url(#arr)"/>`;
  }
  return orthoPath(fx,fy,tx,ty,dashed||false);
}

// ─── BACK ARROWS ─────────────────────────────────────────────────────────────
function backArrows() {
  const routeY = 248;
  const searchX = NM.search.x + NM.search.w/2;
  const searchY = NM.search.y;
  const sources = [
    [NM.bicycle.x + NM.bicycle.w/2, NM.bicycle.y],
    [NM.cart1.x   + NM.cart1.w/2,   NM.cart1.y],
    [NM.resv.x    + NM.resv.w/2,     NM.resv.y],
  ];
  const rightX = sources[sources.length-1][0];

  let svg = '';
  // Vertical drops from each source down to routeY
  sources.forEach(([sx, sy]) => {
    svg += `<line x1="${sx}" y1="${sy}" x2="${sx}" y2="${routeY}" stroke="#4a5a6a" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  });
  // Horizontal backbone from rightmost to searchX
  svg += `<line x1="${rightX}" y1="${routeY}" x2="${searchX}" y2="${routeY}" stroke="#4a5a6a" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  // Vertical rise from backbone up to search top
  svg += `<line x1="${searchX}" y1="${routeY}" x2="${searchX}" y2="${searchY}" stroke="#4a5a6a" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-back)"/>`;
  return svg;
}

// ─── DIAGONAL EDGES FROM TOP ──────────────────────────────────────────────────
function diagonalEdges() {
  const topBx = NM.top.x + NM.top.w/2;
  const topBy = NM.top.y + NM.top.h;

  const targets = [
    [NM.news_top.x,   NM.news_top.y   + NM.news_top.h/2],
    [NM.topics_top.x, NM.topics_top.y + NM.topics_top.h/2],
    [NM.login.x,      NM.login.y      + NM.login.h/2],
    [NM.signup.x,     NM.signup.y     + NM.signup.h/2],
    [NM.guide.x,      NM.guide.y      + NM.guide.h/2],
  ];

  const maxTy = Math.max(...targets.map(([,ty]) => ty));
  let svg = '';

  // Vertical trunk from TOP down to lowest branch (solid)
  svg += `<line x1="${topBx}" y1="${topBy}" x2="${topBx}" y2="${maxTy}" stroke="#5a6a7a" stroke-width="1.5"/>`;

  // Horizontal branch at each target's Y level → target left edge (solid)
  targets.forEach(([tx, ty]) => {
    svg += `<line x1="${topBx}" y1="${ty}" x2="${tx}" y2="${ty}" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arr)"/>`;
  });

  return svg;
}

// ─── SECTION BACKGROUNDS ─────────────────────────────────────────────────────
function sections() {
  return `
    <!-- 利用者セクション -->
    <rect x="30" y="135" width="1720" height="770" rx="12" fill="rgba(30,80,180,0.07)" stroke="#2a3a5a" stroke-width="1"/>
    <text x="48" y="157" fill="#4a6a9a" font-size="13" font-weight="700" font-family="'Hiragino Sans',sans-serif">利用者</text>

    <!-- ヘッダー/フッターナビ エリア -->
    <rect x="210" y="808" width="700" height="82" rx="8" fill="rgba(58,48,16,0.4)" stroke="#6a5820" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="226" y="824" fill="#c8a030" font-size="11" font-weight="700" font-family="'Hiragino Sans',sans-serif">ヘッダー / フッター（全画面共通）</text>

  `;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const vp = document.getElementById('vp');
  let html = '';

  // Sections & legend
  html += sections();

  // Back arrows (behind everything)
  html += backArrows();

  // Diagonal edges from TOP
  html += diagonalEdges();

  // Regular edges
  EDGES.forEach(e => { html += edgeEl(e); });

  // Nodes (on top)
  NODES.forEach(([id]) => { html += nodeEl(NM[id]); });

  // Extra labels
  html += `<text x="310" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">検索する</text>`;
  html += `<text x="478" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">詳細を見る</text>`;
  html += `<text x="656" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">予約画面へ進む</text>`;
  html += `<text x="858" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">顧客情報入力へ</text>`;
  html += `<text x="1058" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">内容確認へ</text>`;
  html += `<text x="1258" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">予約する</text>`;
  html += `<text x="1460" y="270" fill="#4a5a6a" font-size="9" font-family="monospace" text-anchor="middle">予約完了</text>`;

  vp.innerHTML = html;
}

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
let vx=0, vy=0, vscale=1;
const SVG_W=1800, SVG_H=960;

function applyTransform() {
  document.getElementById('vp').setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
}

function fitView() {
  const wrap = document.getElementById('diagram-wrap');
  const pw = wrap.clientWidth, ph = wrap.clientHeight;
  vscale = Math.min(pw/SVG_W, ph/SVG_H) * 0.92;
  vx = (pw - SVG_W*vscale) / 2;
  vy = (ph - SVG_H*vscale) / 2;
  applyTransform();
}

function resetZoom() { vx=40; vy=20; vscale=1; applyTransform(); }

const wrap = document.getElementById('diagram-wrap');
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.88;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  vx = mx - (mx - vx) * factor;
  vy = my - (my - vy) * factor;
  vscale *= factor;
  applyTransform();
}, { passive: false });

let drag = null;
wrap.addEventListener('mousedown', e => { drag = { sx:e.clientX-vx, sy:e.clientY-vy }; });
window.addEventListener('mousemove', e => { if(!drag) return; vx=e.clientX-drag.sx; vy=e.clientY-drag.sy; applyTransform(); });
window.addEventListener('mouseup', () => { drag=null; });

render();
fitView();
</script>
</body>
</html>
