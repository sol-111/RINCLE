<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RINCLE ドキュメント</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

  /* Tab bar */
  .tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    display: flex; align-items: center; gap: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    height: 48px; padding: 0 16px;
  }
  .tab-bar .logo {
    font-size: 15px; font-weight: 700; margin-right: 24px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tab {
    position: relative;
    padding: 12px 20px; font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    border: none; background: none;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 12px; right: 12px;
    height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
  }

  /* Content */
  .content {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  }
  .content iframe {
    width: 100%; height: 100%; border: none;
  }
</style>
</head>
<body>

<div class="tab-bar">
  <span class="logo">RINCLE Docs</span>
  <button class="tab active" data-src="scope.html">改修スコープ</button>
  <button class="tab" data-src="test_cases.html">テストケース</button>
</div>

<div class="content">
  <iframe id="frame" src="scope.html"></iframe>
</div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const frame = document.getElementById('frame');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      frame.src = tab.dataset.src;
    });
  });
</script>
</body>
</html>
