<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RINCLE クレジット支払いフロー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Segoe UI',-apple-system,sans-serif;font-size:13px;background:#0d1117;color:#c0c0cc;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#161b22;padding:6px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#topbar h1{font-size:15px;font-weight:700;color:#d0d0d8;white-space:nowrap}
.sep{width:1px;height:18px;background:#30363d}
.btn{padding:3px 10px;border:1px solid #30363d;border-radius:4px;background:#21262d;color:#a0a0b8;font-size:11px;cursor:pointer}
.btn:hover{background:#30363d;color:#d0d0d8}
#hint{font-size:11px;color:#484f58;margin-left:auto}
.sec-bar{height:28px;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;border-bottom:1px solid #21262d;background:#161b22;border-top:2px solid #3878d0}
.sec-label{font-size:12px;font-weight:700;color:#6088d0}
.diagram-wrap{flex:1;min-height:0;overflow:hidden;cursor:grab;background:#0d1117}
.diagram-wrap:active{cursor:grabbing}
svg{width:100%;height:100%}
#legend{position:fixed;bottom:16px;left:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:6px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.5)}
#legend .leg-title{font-size:11px;font-weight:700;color:#888898;margin-bottom:2px}
#legend .leg-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#a0a0b8}
.leg-box{width:22px;height:13px;border-radius:3px;border-width:1.5px;border-style:solid;flex-shrink:0}
.leg-dia{width:11px;height:11px;transform:rotate(45deg);border-width:1.5px;border-style:solid;flex-shrink:0}
</style>
</head>
<body>

<div id="topbar">
  <h1>RINCLE クレジット支払いフロー</h1>
  <div class="sep"></div>
  <button class="btn" onclick="D.fitView()">全体表示</button>
  <button class="btn" onclick="D.resetZoom()">リセット</button>
  <span id="hint">ホイールでパン / Ctrl+ホイールでズーム / ドラッグでパン</span>
</div>

<div class="sec-bar">
  <span class="sec-label">クレジット決済フロー</span>
</div>

<div class="diagram-wrap" id="wrap">
  <svg id="svg"><defs>
    <marker id="ma" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#7a8a9a"/></marker>
    <marker id="mc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3090b0"/></marker>
    <marker id="mn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a07030"/></marker>
    <marker id="ml" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8060a0"/></marker>
  </defs><g id="vp"></g></svg>
</div>

<div id="legend">
  <div class="leg-title">凡例</div>
  <div class="leg-row">
    <div class="leg-item"><div class="leg-box" style="background:#1a3a28;border-color:#34a853"></div>エンドユーザー</div>
    <div class="leg-item"><div class="leg-box" style="background:#1e1a38;border-color:#8060d8"></div>加盟店</div>
    <div class="leg-item"><div class="leg-box" style="background:#181e3a;border-color:#3878d0"></div>PAY.jp</div>
    <div class="leg-item"><div class="leg-box" style="background:#3a1818;border-color:#d05050"></div>RINCLE</div>
    <div class="leg-item"><div class="leg-dia" style="background:#151e38;border-color:#4a72c0"></div>分岐</div>
    <div class="leg-item"><div class="leg-box" style="background:#301e10;border-color:#a07030"></div>エラー/注意</div>
  </div>
</div>

<script>
const C={
  user:{fill:'#1a3a28',stroke:'#34a853',tc:'#a0e8b8'},
  store:{fill:'#1e1a38',stroke:'#8060d8',tc:'#c0a8f8'},
  admin:{fill:'#3a1818',stroke:'#d05050',tc:'#f0a8a8'},
  decision:{fill:'#151e38',stroke:'#4a72c0',tc:'#88b0e0'},
  external:{fill:'#181e3a',stroke:'#3878d0',tc:'#80b0f0'},
  io:{fill:'#301e10',stroke:'#a07030',tc:'#d8a060'},
  notify:{fill:'#182030',stroke:'#3090b0',tc:'#80c8d8'},
  startend:{fill:'#222230',stroke:'#686890',tc:'#b0b0d0'},
  popup:{fill:'#3a3010',stroke:'#c8a030',tc:'#ffe066'},
  section:{fill:'#1a1a28',stroke:'#404060',tc:'#9090b0'}
};
const SD={rect:{hw:80,hh:26},diamond:{hw:62,hh:36},ellipse:{hw:52,hh:20},wide:{hw:110,hh:26},tall:{hw:80,hh:38}};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mText(cx,cy,lines,color,fs=11){const a=Array.isArray(lines)?lines:lines.split('\n');return a.map((l,i)=>{const dy=cy+(i-(a.length-1)/2)*(fs+3)+1;return`<text x="${cx}" y="${dy}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="${fs}" font-family="'Hiragino Sans',sans-serif">${esc(l)}</text>`;}).join('');}
function nEl(n){const c=C[n.ck],lines=n.lines.flatMap(l=>l.split('\n'));if(n.shape==='ellipse'){const d=SD.ellipse;return`<ellipse cx="${n.cx}" cy="${n.cy}" rx="${d.hw}" ry="${d.hh}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>${mText(n.cx,n.cy,lines,c.tc)}`;}if(n.shape==='diamond'){const{hw,hh}=SD.diamond;const pts=`${n.cx},${n.cy-hh} ${n.cx+hw},${n.cy} ${n.cx},${n.cy+hh} ${n.cx-hw},${n.cy}`;return`<polygon points="${pts}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>${mText(n.cx,n.cy,lines,c.tc,10)}`;}const sh=n.shape==='wide'?'wide':n.shape==='tall'?'tall':'rect';const{hw,hh}=SD[sh];return`<rect x="${n.cx-hw}" y="${n.cy-hh}" width="${hw*2}" height="${hh*2}" rx="8" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>${mText(n.cx,n.cy,lines,c.tc)}`;}

let _drag=null;
window.addEventListener('mousemove',e=>{if(!_drag)return;_drag.set(e.clientX-_drag.sx,e.clientY-_drag.sy);});
window.addEventListener('mouseup',()=>{_drag=null;});

function makeDiagram(wrapId,vpId,svgW,svgH,nodes,lanesF,renderF){
  const NM={};
  nodes.forEach(n=>{NM[n[0]]={id:n[0],cx:n[1],cy:n[2],ck:n[3],shape:n[4],lines:n.slice(5)};});
  function pt(id,side){const n=NM[id],sh=n.shape==='wide'?'wide':n.shape==='tall'?'tall':n.shape;const d=SD[sh];return{r:[n.cx+d.hw,n.cy],l:[n.cx-d.hw,n.cy],t:[n.cx,n.cy-d.hh],b:[n.cx,n.cy+d.hh]}[side];}
  let vx=0,vy=0,vscale=1;
  function applyT(){document.getElementById(vpId).setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);}
  function fitView(){const w=document.getElementById(wrapId),pw=w.clientWidth,ph=w.clientHeight;vscale=Math.min(pw/svgW,ph/svgH)*0.92;vx=(pw-svgW*vscale)/2;vy=(ph-svgH*vscale)/2;applyT();}
  function resetZoom(){vx=40;vy=20;vscale=1;applyT();}
  function render(){const vp=document.getElementById(vpId);let h=lanesF();h+=renderF(pt);nodes.forEach(([id])=>{h+=nEl(NM[id]);});vp.innerHTML=h;}
  const wrap=document.getElementById(wrapId);
  wrap.addEventListener('wheel',e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const f=e.deltaY<0?1.12:0.88,r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;vx=mx-(mx-vx)*f;vy=my-(my-vy)*f;vscale*=f;}else{vx-=e.deltaX;vy-=e.deltaY;}applyT();},{passive:false});
  wrap.addEventListener('mousedown',e=>{_drag={sx:e.clientX-vx,sy:e.clientY-vy,set:(x,y)=>{vx=x;vy=y;applyT();}};});
  return{render,fitView,resetZoom};
}

// Lane X positions
const LX={rincle:140, payjp:380, store:620, enduser:860};
const LW=200;
const SVG_W=1100, SVG_H=1500;

const NODES=[
  // Main flow
  ['eu_reserve',  LX.enduser, 100, 'user','rect','RINCLEバイク予約'],
  ['eu_credit',   LX.enduser, 180, 'user','rect','支払方法\nクレジット選択'],
  ['r_auth',      LX.rincle,  260, 'admin','wide','オーソリ\n（与信枠確保）'],
  ['pj_auth',     LX.payjp,   260, 'external','wide','オーソリ処理'],
  ['d_error',     LX.payjp,   360, 'decision','diamond','決済\nエラー?'],
  ['pj_hold',     LX.payjp,   460, 'external','wide','与信枠確保\n（有効期限30日）'],
  ['eu_confirm',  LX.enduser, 460, 'user','rect','予約確定'],
  ['r_confirm',   LX.rincle,  460, 'admin','wide','予約確定\n在庫確保'],

  // Cancel branch
  ['eu_cancel',   LX.enduser, 580, 'user','rect','キャンセル'],
  ['pj_release',  LX.payjp,   580, 'external','rect','オーソリ解放'],
  ['r_cancel',    LX.rincle,  580, 'admin','wide','予約キャンセル\n在庫解放'],

  // Rental day section
  ['eu_visit',    LX.enduser, 740, 'user','rect','店舗来店'],
  ['st_ride',     LX.store,   740, 'store','wide','RINCLE店舗管理画面\nライド開始ボタン'],
  ['pj_capture',  LX.payjp,   740, 'external','wide','キャプチャ\n（決済確定）'],
  ['d_capture',   LX.payjp,   840, 'decision','diamond','キャプチャ\n失敗?'],
  ['eu_recard',   LX.enduser, 840, 'io','wide','別カードで再決済\nOR別決済手段へ切替'],
  ['st_pos',      LX.store,   940, 'store','rect','精算（店舗POS）'],
  ['st_lend',     LX.store,  1020, 'store','rect','バイク貸出'],
  ['eu_ride',     LX.enduser,1020, 'user','rect','RIDE!'],
  ['r_status',    LX.rincle, 1020, 'admin','rect','ステータス変更'],
];

function lanes(){
  let s='';
  // Swimlane backgrounds
  const laneData=[
    {x:40,  w:LW, label:'RINCLE',       fill:'rgba(58,24,24,0.15)', stroke:'#3a2020', tc:'#d05050'},
    {x:280, w:LW, label:'PAY.jp',        fill:'rgba(24,30,58,0.15)', stroke:'#1e2840', tc:'#3878d0'},
    {x:520, w:LW, label:'加盟店',        fill:'rgba(30,26,56,0.15)', stroke:'#2a2240', tc:'#8060d8'},
    {x:760, w:LW, label:'エンドユーザー', fill:'rgba(26,58,40,0.15)', stroke:'#1e3828', tc:'#34a853'},
  ];
  laneData.forEach(l=>{
    s+=`<rect x="${l.x}" y="40" width="${l.w}" height="${SVG_H-80}" rx="6" fill="${l.fill}" stroke="${l.stroke}" stroke-width="1"/>`;
    s+=`<text x="${l.x+l.w/2}" y="65" text-anchor="middle" fill="${l.tc}" font-size="13" font-weight="700" font-family="'Hiragino Sans',sans-serif">${l.label}</text>`;
  });
  // Section dividers
  s+=`<line x1="40" y1="680" x2="960" y2="680" stroke="#404060" stroke-width="1" stroke-dasharray="6,3"/>`;
  s+=`<text x="500" y="700" text-anchor="middle" fill="#6088d0" font-size="12" font-weight="700" font-family="'Hiragino Sans',sans-serif">レンタル当日</text>`;
  s+=`<line x1="40" y1="540" x2="960" y2="540" stroke="#404060" stroke-width="1" stroke-dasharray="6,3"/>`;
  s+=`<text x="500" y="556" text-anchor="middle" fill="#a07030" font-size="12" font-weight="700" font-family="'Hiragino Sans',sans-serif">キャンセルフロー</text>`;
  // Notes
  s+=`<text x="${LX.rincle}" y="310" text-anchor="middle" fill="#686880" font-size="9" font-style="italic" font-family="'Hiragino Sans',sans-serif">※実際の請求は行わず、利用可能枠のみを一時的に確保</text>`;
  s+=`<text x="${LX.rincle}" y="324" text-anchor="middle" fill="#686880" font-size="9" font-style="italic" font-family="'Hiragino Sans',sans-serif">※未回収リスクを抑えるため、予約時に与信確認のみ実施</text>`;
  s+=`<text x="${LX.enduser}" y="618" text-anchor="middle" fill="#686880" font-size="9" font-style="italic" font-family="'Hiragino Sans',sans-serif">※予約前日23時59分まで</text>`;
  s+=`<text x="${LX.enduser}" y="632" text-anchor="middle" fill="#686880" font-size="9" font-style="italic" font-family="'Hiragino Sans',sans-serif">オンラインでキャンセル可能</text>`;
  return s;
}

function edges(pt){
  function e(fid,fs,tid,ts,opts={}){
    const[fx,fy]=pt(fid,fs),[tx,ty]=pt(tid,ts);
    const cross=opts.cross||false,ng=opts.ng||false,loop=opts.loop||false;
    const mk=cross?'mc':ng?'mn':loop?'ml':'ma';
    const sc=cross?'#3090b0':ng?'#a07030':loop?'#8060a0':'#5a6a7a';
    const sw=(cross||loop)?'1.2':'1.5';
    const da=(cross||loop)?' stroke-dasharray="5,3"':'';
    let d;
    if(opts.path){d=opts.path;}
    else if(Math.abs(fy-ty)<2)d=`M ${fx} ${fy} H ${tx}`;
    else if(Math.abs(fx-tx)<2)d=`M ${fx} ${fy} V ${ty}`;
    else if(fs==='t'||fs==='b'){const m=opts.mid||(fy+ty)/2;d=`M ${fx} ${fy} V ${m} H ${tx} V ${ty}`;}
    else{const m=(fx+tx)/2;d=`M ${fx} ${fy} H ${m} V ${ty} H ${tx}`;}
    let s=`<path d="${d}" fill="none" stroke="${sc}" stroke-width="${sw}"${da} marker-end="url(#${mk})"/>`;
    if(opts.label){const lx=(fx+tx)/2,ly=Math.min(fy,ty)-7;s+=`<text x="${lx}" y="${ly}" text-anchor="middle" fill="${sc}" font-size="9" font-family="monospace">${esc(opts.label)}</text>`;}
    return s;
  }
  let h='';
  // Main flow
  h+=e('eu_reserve','b','eu_credit','t');
  h+=e('eu_credit','l','pj_auth','r',{cross:true});
  h+=e('pj_auth','l','r_auth','r');
  h+=e('pj_auth','b','d_error','t');
  h+=e('d_error','b','pj_hold','t',{label:'No'});
  // Error loop back
  const[ex,ey]=pt('d_error','r');
  const[cx,cy]=pt('eu_credit','r');
  h+=`<path d="M ${ex} ${ey} H ${ex+40} V ${cy} H ${cx}" fill="none" stroke="#8060a0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ml)"/>`;
  h+=`<text x="${ex+50}" y="${(ey+cy)/2}" fill="#8060a0" font-size="9" font-family="monospace">Yes</text>`;

  h+=e('pj_hold','r','eu_confirm','l',{cross:true});
  h+=e('eu_confirm','l','r_confirm','r',{cross:true});

  // Cancel branch
  h+=e('eu_confirm','b','eu_cancel','t');
  h+=e('eu_cancel','l','pj_release','r',{cross:true});
  h+=e('pj_release','l','r_cancel','r');

  // Rental day
  h+=e('eu_visit','l','st_ride','r',{cross:true});
  h+=e('st_ride','l','pj_capture','r');
  h+=e('pj_capture','b','d_capture','t');
  h+=e('d_capture','r','eu_recard','l',{label:'Yes',ng:true});
  h+=e('d_capture','b','st_pos','t',{label:'No',path:`M ${pt('d_capture','b')[0]} ${pt('d_capture','b')[1]} V ${pt('st_pos','t')[1]-10} H ${pt('st_pos','t')[0]} V ${pt('st_pos','t')[1]}`});
  h+=e('st_pos','b','st_lend','t');
  h+=e('st_lend','r','eu_ride','l',{cross:true});
  h+=e('st_lend','l','r_status','r',{cross:true});
  return h;
}

const D=makeDiagram('wrap','vp',SVG_W,SVG_H,NODES,lanes,edges);
D.render();
requestAnimationFrame(()=>D.fitView());
</script>
</body>
</html>
